---
- name: Configure tier 0 controller
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars/secrets.yml
  vars:
    packages:
      - sshpass
      - rpi-imager
  tasks:
    - name: Install controller packages
      ansible.builtin.package:
        name: "{{ packages }}"
        state: present
      become: true

    - name: Register ssh connections
      ansible.builtin.import_role:
        name: register_ssh
      vars:
        register_ssh_user: gelzibar
        register_host: hillhouse

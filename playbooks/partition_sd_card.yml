---
- name: Partition the SD Card for UEFI5
  hosts: localhost
  gather_facts: false
  vars_prompt:
    - name: disk
      prompt: "What is the target disk? Ex: /dev/sde"
      private: false
  tasks:
    - name: Unmount a mounted volume
      ansible.posix.mount:
        path: /mnt/sd_boot
        state: unmounted
      become: true
    - name: Read device information (always use unit when probing)
      community.general.parted:
        device: "{{ disk }}"
        unit: MiB
      register: disk_info
      become: true
    - name: Print disk_info
      ansible.builtin.debug:
        var: disk_info
    - name: Remove all partitions from disk
      community.general.parted:
        device: "{{ disk }}"
        number: '{{ item.num }}'
        state: absent
      loop: '{{ disk_info.partitions }}'
      # check_mode: true
      become: true
    - name: Create a FAT boot partition
      community.general.parted:
        device: "{{ disk }}"
        number: 1
        # name: EFI system partition
        fs_type: fat32
        part_end: 500MiB
        flags:
          - boot
        state: present
      # check_mode: true
      become: true
    - name: Create mount point
      ansible.builtin.file:
        path: /mnt/sd_boot
        state: directory
        mode: '0755'
      # check_mode: true
      become: true
    - name: Mount SD Card boot partition
      ansible.posix.mount:
        path: /mnt/sd_boot
        src: "{{ disk }}1"
        # src: "/dev/sdf1"
        fstype: vfat
        # opts: ro,noauto
        state: ephemeral
      # check_mode: true
      become: true
    - name: Unarchive a file that needs to be downloaded (added in 2.0)
      ansible.builtin.unarchive:
        src: https://github.com/worproject/rpi5-uefi/releases/download/v0.3/RPi5_UEFI_Release_v0.3.zip
        dest: /mnt/sd_boot
        remote_src: true
      # check_mode: true
      become: true
    - name: Unmount a mounted volume
      ansible.posix.mount:
        path: /mnt/sd_boot
        state: unmounted
      become: true

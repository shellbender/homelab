---
# tasks file for add_pve_user
- name: Generate authentication
  when: ticket is not defined or
        prevent_token is not defined
  block:
    - name: Generate ticket
      ansible.builtin.uri:
        url: "{{ add_pve_user_domain_name }}/api2/json/access/ticket"
        method: POST
        validate_certs: false
        body_format: form-urlencoded
        body:
          username: root@pam
          password: "{{ hillhouse_root_password }}"
        status_code: 200
      register: ticket_response
    - name: Set ticket
      ansible.builtin.set_fact:
        ticket: "{{ ticket_response.json.data.ticket }}"
        prevent_token: "{{ ticket_response.json.data.CSRFPreventionToken }}"
- name: Pull users
  ansible.builtin.uri:
    url: "{{ add_pve_user_domain_name }}/api2/json/access/users"
    method: GET
    headers:
      Cookie: "PVEAuthCookie={{ ticket }}"
    validate_certs: false
    status_code: 200
  register: users_response
- name: Set existing users
  ansible.builtin.set_fact:
    users: "{{ users_response.json.data | map(attribute='userid') }}"
- name: Create new user
  when: add_pve_user_userid not in users
  ansible.builtin.uri:
    url: "{{ add_pve_user_domain_name }}/api2/json/access/users"
    method: POST
    headers:
      Cookie: "PVEAuthCookie={{ ticket }}"
      CSRFPreventionToken: "{{ prevent_token }}"
    body_format: form-urlencoded
    body:
      userid: "{{ add_pve_user_userid }}"
      email: "{{ add_pve_user_email }}"
      firstname: "{{ add_pve_user_firstname }}"
      lastname: "{{ add_pve_user_lastname }}"
      password: "{{ add_pve_user_password }}"
    validate_certs: false
    status_code: 200
  register: create_response

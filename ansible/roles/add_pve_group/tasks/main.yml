---
# tasks file for add_pve_group
- name: Generate authentication
  when: ticket is not defined or
        prevent_token is not defined
  block:
    - name: Generate ticket
      ansible.builtin.uri:
        url: "{{ add_pve_user_domain_name }}/api2/json/access/ticket"
        method: POST
        validate_certs: false
        body_format: form-urlencoded
        body:
          username: root@pam
          password: "{{ hillhouse_root_password }}"
        status_code: 200
      register: ticket_response
    - name: Set ticket
      ansible.builtin.set_fact:
        ticket: "{{ ticket_response.json.data.ticket }}"
        prevent_token: "{{ ticket_response.json.data.CSRFPreventionToken }}"
- name: Pull groups
  ansible.builtin.uri:
    url: "{{ add_pve_group_domain_name }}/api2/json/access/groups"
    method: GET
    headers:
      Cookie: "PVEAuthCookie={{ ticket }}"
    validate_certs: false
    status_code: 200
  register: groups_response
- name: Print
  ansible.builtin.debug:
    var: groups_response
    verbosity: 1
- name: Print
  ansible.builtin.debug:
    var: groups_response.json.data | selectattr('groupid', 'defined') | map(attribute='groupid') | list
    verbosity: 1
- name: Set existing groups
  ansible.builtin.set_fact:
    pve_groups: "{{ groups_response.json.data | map(attribute='groupid') }}"
- name: Create group - {{ add_pve_group_name }}
  when: add_pve_group_name not in pve_groups
  ansible.builtin.uri:
    url: "{{ domain_name }}/api2/json/access/groups"
    method: POST
    headers:
      Cookie: "PVEAuthCookie={{ ticket }}"
      CSRFPreventionToken: "{{ prevent_token }}"
    body_format: form-urlencoded
    body:
      groupid: "{{ add_pve_group_name }}"
      comment: "{{ add_pve_group_comment }}"
    validate_certs: false
    status_code: 200
  register: create_response
- name: Print
  ansible.builtin.debug:
    var: create_response
    verbosity: 1
- name: Get acl
  ansible.builtin.uri:
    url: "{{ domain_name }}/api2/json/access/acl"
    method: GET
    headers:
      Cookie: "PVEAuthCookie={{ ticket }}"
      CSRFPreventionToken: "{{ prevent_token }}"
    validate_certs: false
    status_code: 200
  register: acl_response
- name: Print
  ansible.builtin.debug:
    var: acl_response
    verbosity: 1
- name: Assign role to global admin group
  ansible.builtin.uri:
    url: "{{ domain_name }}/api2/json/access/acl"
    method: PUT
    headers:
      Cookie: "PVEAuthCookie={{ ticket }}"
      CSRFPreventionToken: "{{ prevent_token }}"
    body_format: form-urlencoded
    body:
      path: /
      roles: Administrator
      groups: "{{ group_name }}"
    validate_certs: false
    status_code: 200
  register: acl_response
- name: Print
  ansible.builtin.debug:
    var: acl_response
    verbosity: 1
# - name: Assign users to group
#   ansible.builtin.include_tasks: add_proxmox_users_to_groups.yml
#   vars:
#     - username: "{{ item }}"
#   loop: "{{ target_users }}"

- name: Add user to group
  ansible.builtin.uri:
    url: "{{ domain_name }}/api2/json/access/users/{{ item }}"
    method: PUT
    headers:
      Cookie: "PVEAuthCookie={{ ticket }}"
      CSRFPreventionToken: "{{ prevent_token }}"
    body_format: form-urlencoded
    body:
      groups: "{{ group_name }}"
    validate_certs: false
    status_code: 200
  loop: "{{ target_users }}"
  # register: users_response


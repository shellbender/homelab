---
- name: Configure proxmox node
  hosts: all
  gather_facts: true
  vars_files:
    - vars/secrets.yml
  vars:
    hostname: "{{ ansible_facts['hostname'] }}"
    line_indent: "      "
    packages:
      - python3-debian # dependency for deb822_repository module
      - vim
  tasks:
    # - name: Copy .bashrc profile
    #   ansible.builtin.copy:
    #     dest: /root
    #     src: /home/andrew/.bashrc
    #     mode: "0644"
    #   become: true
    - name: Update /etc/hosts
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: "{{ hostname }}"
        line: "{{ ansible_default_ipv4.address }}{{ line_indent }}{{ hostname }}"
      become: true
    - name: Register to controller's ssh
      ansible.builtin.import_role:
        name: register_ssh
      vars:
        register_ssh_user: gelzibar
    - name: Install node packages
      ansible.builtin.package:
        name: "{{ packages }}"
        state: present
      become: true
    - name: Add the Proxmox VE repository
      ansible.builtin.deb822_repository:
        name: pve
        architectures:
          - arm64
        uris:
          - https://mirrors.apqa.cn/proxmox/debian/pve
        suites:
          - "{{ ansible_facts['distribution_release'] }}"
        components:
          - port
        signed_by: https://mirrors.apqa.cn/proxmox/debian/pveport.gpg
      become: true
      register: results
    - name: Upgrade the OS (apt-get dist-upgrade)
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true
      become: true
    - name: Install required proxmox packages
      ansible.builtin.package:
        name:
          - ifupdown2
          - proxmox-ve
          - postfix
          - open-iscsi
        state: present
      become: true
    # - name: Update all packages to their latest version
    #   ansible.builtin.apt:
    #     name: "*"
    #     state: latest
    - name: Ensure a locale exists
      community.general.locale_gen:
        name: en_US.UTF-8
        state: present
      become: true
    - name: Configure locale
      ansible.builtin.command:
        cmd: localedef -i en_US -f UTF-8 en_US.UTF-8
      changed_when: true
      become: true
